openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
  - name: subscribe
    description: Subscription operations
  - name: admin
    description: Admin panel operations
  - name: crm-auth
    description: CRM authentication
  - name: crm-leads
    description: CRM lead management
  - name: crm-tasks
    description: CRM task management
  - name: crm-users
    description: CRM user management
  - name: crm-links
    description: CRM submission links
  - name: crm-public
    description: Public lead submission
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscribe:
    post:
      operationId: submitSubscribe
      tags: [subscribe]
      summary: Submit subscription intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/contacts:
    get:
      operationId: adminGetContacts
      tags: [admin]
      summary: Get all contact submissions
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminContactsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/contacts/{id}/read:
    patch:
      operationId: adminMarkContactRead
      tags: [admin]
      summary: Mark contact as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/subscribers:
    get:
      operationId: adminGetSubscribers
      tags: [admin]
      summary: Get all subscribers
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Subscriber list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSubscribersResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── CRM Auth ──────────────────────────────────────────
  /crm/auth/login:
    post:
      operationId: crmLogin
      tags: [crm-auth]
      summary: CRM user login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crm/me:
    get:
      operationId: crmGetMe
      tags: [crm-auth]
      summary: Get current CRM user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── CRM Leads ──────────────────────────────────────────
  /crm/leads:
    get:
      operationId: crmGetLeads
      tags: [crm-leads]
      summary: List all leads
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Lead list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLeadsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: crmCreateLead
      tags: [crm-leads]
      summary: Create a new lead
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLead"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crm/leads/{id}:
    get:
      operationId: crmGetLead
      tags: [crm-leads]
      summary: Get a lead by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLeadDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: crmUpdateLead
      tags: [crm-leads]
      summary: Update a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLeadInput"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmLead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: crmDeleteLead
      tags: [crm-leads]
      summary: Delete a lead (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /crm/leads/{id}/notes:
    get:
      operationId: crmGetLeadNotes
      tags: [crm-leads]
      summary: Get notes for a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmNote"
    post:
      operationId: crmAddLeadNote
      tags: [crm-leads]
      summary: Add a note to a lead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmNoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmNote"

  /crm/leads/{id}/estimate:
    post:
      operationId: crmEstimateRepairCost
      tags: [crm-leads]
      summary: AI estimate of repair costs for a property
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmEstimateResponse"

  /crm/leads/{id}/fetch-property-data:
    post:
      operationId: crmFetchPropertyData
      tags: [crm-leads]
      summary: Fetch property data from PropertyAPI.co and auto-fill lead fields
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property data fetched and lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmFetchPropertyDataResponse"

  /crm/leads/{id}/skip-trace:
    post:
      operationId: crmSkipTrace
      tags: [crm-leads]
      summary: Run skip trace to find seller phone and email via PropertyAPI.co
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skip trace completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSkipTraceResponse"

  /crm/leads/{leadId}/comps:
    get:
      operationId: crmGetComps
      tags: [crm-leads]
      summary: Get comparable sales for a lead
      security:
        - bearerAuth: []
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmComp"
    post:
      operationId: crmCreateComp
      tags: [crm-leads]
      summary: Add a comparable sale to a lead
      security:
        - bearerAuth: []
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmCompInput"
      responses:
        "201":
          description: Comp created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmComp"

  /crm/leads/{leadId}/comps/{compId}:
    delete:
      operationId: crmDeleteComp
      tags: [crm-leads]
      summary: Delete a comparable sale
      security:
        - bearerAuth: []
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
        - name: compId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /crm/leads/{leadId}/comps/recalculate:
    post:
      operationId: crmRecalculateComps
      tags: [crm-leads]
      summary: Recalculate adjusted prices and ARV from existing comps
      security:
        - bearerAuth: []
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated comps list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmComp"

  # ── CRM Stats ──────────────────────────────────────────
  /crm/stats:
    get:
      operationId: crmGetStats
      tags: [crm-leads]
      summary: CRM dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmStatsResponse"

  # ── CRM Tasks ──────────────────────────────────────────
  /crm/tasks:
    get:
      operationId: crmGetTasks
      tags: [crm-tasks]
      summary: List tasks
      security:
        - bearerAuth: []
      parameters:
        - name: leadId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmTask"
    post:
      operationId: crmCreateTask
      tags: [crm-tasks]
      summary: Create a task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmTaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmTask"

  /crm/tasks/{id}:
    patch:
      operationId: crmUpdateTask
      tags: [crm-tasks]
      summary: Update a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmTaskInput"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmTask"
    delete:
      operationId: crmDeleteTask
      tags: [crm-tasks]
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"

  # ── CRM Users (admin only) ───────────────────────────
  /crm/users:
    get:
      operationId: crmGetUsers
      tags: [crm-users]
      summary: List CRM users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmUser"
    post:
      operationId: crmCreateUser
      tags: [crm-users]
      summary: Create a CRM user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmUserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmUser"

  /crm/users/{id}:
    patch:
      operationId: crmUpdateUser
      tags: [crm-users]
      summary: Update a CRM user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmUserInput"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmUser"
    delete:
      operationId: crmDeleteUser
      tags: [crm-users]
      summary: Delete a CRM user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"

  # ── CRM Submission Links ─────────────────────────────
  /crm/links:
    get:
      operationId: crmGetLinks
      tags: [crm-links]
      summary: List submission links (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Link list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrmSubmissionLink"
    post:
      operationId: crmCreateLink
      tags: [crm-links]
      summary: Create a submission link (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLinkInput"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSubmissionLink"

  /crm/links/{id}:
    patch:
      operationId: crmUpdateLink
      tags: [crm-links]
      summary: Toggle link active/inactive
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmLinkInput"
      responses:
        "200":
          description: Link updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSubmissionLink"
    delete:
      operationId: crmDeleteLink
      tags: [crm-links]
      summary: Delete a submission link
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"

  # ── Public Lead Submission ──────────────────────────
  /crm/public/submit/{token}:
    get:
      operationId: crmGetSubmissionForm
      tags: [crm-public]
      summary: Get public submission form info
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Form info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSubmissionFormInfo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: crmSubmitPublicLead
      tags: [crm-public]
      summary: Submit a lead via public link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrmPublicLeadInput"
      responses:
        "201":
          description: Lead submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "404":
          description: Link not found or inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ContactRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        company:
          type: string
        phone:
          type: string
        message:
          type: string
          minLength: 1
        service:
          type: string
      required: [name, email, message]

    ContactResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    SubscribeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        company:
          type: string
        plan:
          type: string
          default: basic
      required: [name, email]

    SubscribeResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    AdminLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
        message:
          type: string
      required: [token, message]

    AdminContactsResponse:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/ContactRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [contacts, total, page, limit]

    AdminSubscribersResponse:
      type: object
      properties:
        subscribers:
          type: array
          items:
            $ref: "#/components/schemas/SubscriberRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [subscribers, total, page, limit]

    AdminStatsResponse:
      type: object
      properties:
        totalContacts:
          type: integer
        unreadContacts:
          type: integer
        totalSubscribers:
          type: integer
        recentContacts:
          type: array
          items:
            $ref: "#/components/schemas/ContactRecord"
      required: [totalContacts, unreadContacts, totalSubscribers, recentContacts]

    ContactRecord:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        service:
          type: string
          nullable: true
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, message, read, createdAt]

    SubscriberRecord:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: string
          nullable: true
        plan:
          type: string
        status:
          type: string
        createdAt:
          type: string
      required: [id, name, email, plan, status, createdAt]

    ErrorResponse:
      type: object
      properties:
