            <h2>Motivated Seller Lead Categories &mdash; Distressed Property Types</h2>
            <h3>Pre-Foreclosure</h3>
            <p>Homeowners who have received a Notice of Default (NOD) but haven&apos;t lost their property yet. Pre-foreclosure leads are among the highest-motivation sellers. Digor finds, skip traces, and outreaches pre-foreclosure owners for real estate investors and wholesalers.</p>
            <h3>Foreclosure &amp; Bank-Owned (REO)</h3>
            <p>Properties already repossessed by lenders or going to sheriff auction. Foreclosure and REO properties are often priced below market value — prime targets for real estate investors seeking discounted acquisitions.</p>
            <h3>Absentee Owner</h3>
            <p>Non-occupant property owners — out-of-state owners, tired landlords, and absentee investors. Absentee owner lists are a cornerstone of motivated seller outreach. Digor skip traces and manages outreach to absentee owners at scale.</p>
            <h3>Tax Delinquent</h3>
            <p>Owners behind on property taxes, often indicating financial distress and high seller motivation. Tax delinquent property lists are one of the most reliable distressed property lead sources for wholesalers and real estate investors.</p>
            <h3>Vacant / Abandoned Property</h3>
            <p>Vacant and abandoned properties whose owners are often unreachable through standard means. Skip tracing is essential for vacant property lead generation. Digor&apos;s distressed property finder identifies and contacts vacant property owners for real estate acquisitions.</p>
            <h3>High Equity</h3>
            <p>Homeowners with significant equity or free-and-clear properties who have flexibility to accept creative offers — seller financing, subject-to, or cash deals. High equity property lists are valuable for real estate investors pursuing off-market deals.</p>
          </section>

          <section>
            <h2>ARV Calculation &amp; Real Estate Comps Analysis</h2>
            <p>Digor CRM includes a built-in <strong>ARV calculator</strong> and <strong>real estate comps tool</strong>. The ARV calculator automatically pulls comparable sold properties, adjusts for square footage, condition, and location differences, and computes the After Repair Value. The MAO (Maximum Allowable Offer) calculator then derives the maximum price a real estate investor should pay. Our comps-based ARV calculation gives investors and wholesalers data-driven offers on every deal.</p>
          </section>
