packages:
  "framer-motion": "For premium scroll reveal and popup animations"
  "react-hook-form": "For complex form state management"
  "@hookform/resolvers": "For Zod form validation integration"
  "zod": "For contact form schema validation"

images:
  - path: "artifacts/digor-website/public/images/hero-bg.png"
    description: "Dark deep navy blue abstract geometric background with subtle gold accents, premium corporate feel, high resolution, 3D structure"
    aspect_ratio: "16:9"
  - path: "artifacts/digor-website/public/images/about-bg.png"
    description: "Abstract dark slate technical data node background, subtle and professional, interconnected lines"
    aspect_ratio: "16:9"
  - path: "artifacts/digor-website/public/images/avatar-1.png"
    description: "Professional elegant silhouette avatar icon on dark background, minimalistic, gold accent"
    aspect_ratio: "1:1"
  - path: "artifacts/digor-website/public/images/avatar-2.png"
    description: "Professional elegant silhouette avatar icon on dark background, minimalistic, subtle blue lighting"
    aspect_ratio: "1:1"
  - path: "artifacts/digor-website/public/images/avatar-3.png"
    description: "Professional elegant silhouette avatar icon on dark background, minimalistic, clean lines"
    aspect_ratio: "1:1"
  - path: "artifacts/digor-website/public/images/avatar-4.png"
